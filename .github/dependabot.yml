version: 2
# Keeps the hash-pinned action SHAs current (dependabot understands pinned-SHA
# + `# vX` comments and bumps both). Weekly, grouped, labelled.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]
    groups:
      actions:
        patterns: ["*"]
