# Security scans for the subarr-subgen patch-stack repo.
#
# Different scope than subarr's own security.yml:
#   - No app code lives here — only patches + tooling + Dockerfile.
#   - bandit / semgrep target scripts/ only (our extraction + validation
#     helpers) since they execute on user machines via scripts/build.sh.
#   - pip-audit doesn't apply (we don't ship a Python package).
#   - trivy scans the BUILT image (upstream subgen + our patches) for
#     vulnerabilities introduced by upstream's base or our additions.
#   - codeql.yml adds semantic scanning of scripts/ (parity with subarr).

name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Tuesdays 07:00 UTC — staggered away from rebase-test (Mon 06:00 UTC)
    # so failures don't cascade in a single morning.
    - cron: "0 7 * * 2"
  workflow_dispatch:

# Least-privilege at the workflow level; the SARIF-uploading jobs elevate to
# security-events: write + actions: read themselves (actions: read is required
# by codeql-action/upload-sarif to read the workflow run — without it the
# upload fails "Resource not accessible by integration", #163 follow-up).
permissions:
  contents: read

jobs:
  bandit:
    name: bandit (scripts/)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload-sarif (best-effort)
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: "3.11" }
      - run: pip install bandit[sarif]
      - name: bandit -r scripts/
        run: |
          bandit -r scripts/ -ll -ii --skip B101 \
                 -f sarif -o bandit.sarif || true
          bandit -r scripts/ -ll -ii --skip B101
      - if: always()
        continue-on-error: true   # code-scanning/GHAS not enabled on this private repo; don't red the job on upload (#163)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: bandit.sarif
          category: bandit

  semgrep:
    name: semgrep (pattern security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload-sarif (best-effort)
      actions: read
    container:
      # Pinned by digest (v1.142.0) — mutable tags on security tooling are the
      # trivy-action Mar-2026 tag-poisoning lesson. Same pin as coaxk/subarr.
      image: semgrep/semgrep@sha256:03402a5040a88a570dec58375ef1a19fa777dd61575afdc7d5527ddf308dd765
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - name: semgrep ci
        env:
          SEMGREP_RULES: >-
            p/security-audit
            p/secrets
            p/bash
        run: semgrep ci --sarif --output=semgrep.sarif || true
      - if: always()
        continue-on-error: true   # code-scanning/GHAS not enabled on this private repo; don't red the job on upload (#163)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  trivy:
    name: trivy (patched image CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload-sarif (best-effort)
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: free disk space (CUDA 12.8 base + torch cu128 need headroom)
        run: |
          # Same reclaim as release.yml — the trivy job builds the full image,
          # which the default runner's ~14 GB can't hold (#163).
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /
      - name: build image (no push)
        run: bash scripts/build.sh
      # Split into a gate + an artifact producer. In format=sarif mode,
      # trivy-action internally scans with "all severities" to populate the
      # code-scanning UI, and the `severity` + `ignore-unfixed` filters DO NOT
      # propagate to the exit-code check -- so a single SARIF step with
      # exit-code 1 fails on LOW findings we explicitly said we do not gate on.
      # Filed upstream: https://github.com/aquasecurity/trivy-action/issues/389
      #
      # Bit us 2026-07-21: CVE-2025-3000 in torch (trivy severity LOW, no fix
      # available for the cu128 wheel) reddened main even though the gate is
      # declared HIGH,CRITICAL. Same split as coaxk/subarr's security.yml.
      - name: trivy scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: subarr-subgen:dev
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          timeout: "20m"
          scanners: vuln
      - name: trivy scan (SARIF artifact)
        # exit-code 0 -- the gate above already decided pass/fail. This step
        # exists only to keep feeding the code-scanning UI, where LOW/MEDIUM
        # findings stay visible.
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: subarr-subgen:dev
          format: sarif
          output: trivy.sarif
          # We fail on HIGH/CRITICAL only — upstream's CUDA base image
          # ships its own pile of MEDIUM-and-below findings we can't fix.
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          # The cu128 torch stack ships a ~2GB libtorch_cuda.so; trivy's
          # default 5m deadline isn't enough to walk it and it dies with
          # "context deadline exceeded" (#163 fallout). Give it room.
          timeout: "20m"
          # Vuln scan only — secret scanning a multi-GB CUDA image is slow
          # and low-value here; our own scripts are covered by semgrep
          # p/secrets in the job above.
          scanners: vuln
      - if: always()
        continue-on-error: true   # code-scanning/GHAS not enabled on this private repo; don't red the job on upload (#163)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: trivy.sarif
          category: trivy
