# Tag-triggered release: build multi-arch image + push to GHCR + cut a
# GitHub Release with changelog body.
#
# Trigger: pushing a tag matching v*.*.*-r* (e.g. v2026.05.3-r1).
#
# Image tags published:
#   ghcr.io/coaxk/subarr-subgen:<UPSTREAM>-r<REV>   (immutable)
#   ghcr.io/coaxk/subarr-subgen:<UPSTREAM>          (latest -r* for this upstream)
#   ghcr.io/coaxk/subarr-subgen:latest              (moves on every release)
#
# :stable is NOT moved here — that's a manual promotion after 7-day soak,
# done via workflow_dispatch on a separate `promote-stable.yml` (TODO).

name: release

on:
  push:
    tags:
      - "v*.*.*-r*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2026.05.3-r1)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: checkout (with submodules)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: apply-patches.sh
        run: bash scripts/apply-patches.sh

      - name: validate-patched.py
        run: python scripts/validate-patched.py

      - name: derive version tags
        id: version
        env:
          # Env indirection instead of inline ${{ }} expansion in the script —
          # an expression expanded directly into `run:` becomes shell code
          # (template injection); an env var is just data. (zizmor)
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ -z "$TAG" || "$TAG" == "$GITHUB_REF" ]]; then
            TAG="$INPUT_TAG"
          fi
          # Strip leading v and split on -r
          VERSION="${TAG#v}"
          UPSTREAM="${VERSION%-r*}"
          REV="${VERSION#*-r}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "rev=$REV" >> $GITHUB_OUTPUT
          echo "image_full=ghcr.io/coaxk/subarr-subgen:${VERSION}" >> $GITHUB_OUTPUT
          echo "image_upstream=ghcr.io/coaxk/subarr-subgen:${UPSTREAM}" >> $GITHUB_OUTPUT
          echo "image_latest=ghcr.io/coaxk/subarr-subgen:latest" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      # Note: linux/arm64 builds are deliberately out of scope for v1.0.
      # The upstream subgen NVIDIA CUDA base image targets amd64 and ARM64
      # isn't a realistic homelab combo for whisper transcription. Users
      # who want ARM can build locally from the patches. Multi-arch via
      # QEMU also blew the runner disk during torch install (5GB+ per
      # platform × QEMU overhead). Re-enable if/when a self-hosted runner
      # is available.

      - name: login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: free disk space (torch cu128 + CUDA 12.8 base need headroom)
        run: |
          # The default GH runner (~14 GB free) can't hold the cudnn-runtime
          # base + torch cu128's nvidia-* CUDA wheels (cuBLAS/cuFFT/cuDNN are
          # hundreds of MB each). Reclaim the preinstalled SDKs we never use
          # (~25 GB) so the docker build has room. (#163)
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /

      - name: stage build context (patched tree → build/)
        run: |
          rm -rf build/
          mkdir -p build/
          cp -a upstream/. build/
          rm -rf build/.git

      - name: build + push (linux/amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: build/
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            UPSTREAM_VERSION=${{ steps.version.outputs.upstream }}
            PATCH_REV=${{ steps.version.outputs.rev }}
            RELEASE_TAG=${{ steps.version.outputs.tag }}
          tags: |
            ${{ steps.version.outputs.image_full }}
            ${{ steps.version.outputs.image_upstream }}
            ${{ steps.version.outputs.image_latest }}

      - name: create GitHub release
        # zizmor suggests `gh release create` instead of a third-party action.
        # Deliberate keep: the action is SHA-pinned, battle-tested on this exact
        # flow (r1-r8), and swapping the release path for an info-level nit is
        # churn where breakage hurts most. Revisit if the pin ever goes stale.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            **Image**: `${{ steps.version.outputs.image_full }}`

            **Upstream**: McCloudS/subgen `${{ steps.version.outputs.upstream }}` (see `scripts/upstream.pin`)
            **Patch revision**: `r${{ steps.version.outputs.rev }}`

            ## Patches in this image
            See [`patches/series`](./patches/series).

            ## Quickstart
            ```yaml
            services:
              subgen:
                image: ${{ steps.version.outputs.image_full }}
            ```
