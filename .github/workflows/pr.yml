# PR validation: apply patches, validate structure, attempt docker build.
#
# The image build is the most expensive job — runs only if patches apply
# clean and the validator passes. Saves CI minutes on broken PRs.

name: PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: every job here only reads the repo (checkout + build).
permissions:
  contents: read

jobs:
  zizmor:
    # Blocking workflow-security audit — mirrors coaxk/subarr's gate so the
    # hardening (hash-pinned actions, least-privilege permissions, pinned
    # images) can't silently regress.
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install zizmor==1.25.2
      - run: zizmor --persona=regular .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}

  patches:
    name: apply + validate
    runs-on: ubuntu-latest
    steps:
      - name: checkout (with submodules)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: apply-patches.sh
        run: bash scripts/apply-patches.sh

      - name: validate-patched.py
        run: python scripts/validate-patched.py

      - name: upload patched subgen.py as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: patched-subgen-py
          path: upstream/subgen.py
          retention-days: 7

  build:
    name: docker build
    needs: patches
    runs-on: ubuntu-latest
    steps:
      - name: checkout (with submodules)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: docker buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: free disk space (torch cu128 + CUDA 12.8 base need headroom)
        run: |
          # The default GH runner (~14 GB free) can't hold the cudnn-runtime
          # base + torch cu128's nvidia-* CUDA wheels — the build dies with
          # "No space left on device" on the torch install. Reclaim the
          # preinstalled SDKs we never use (~25 GB). Mirrors release.yml. (#163)
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /

      - name: build (no push)
        run: bash scripts/build.sh

      - name: image labels
        run: docker inspect subarr-subgen:dev --format '{{json .Config.Labels}}' | python -m json.tool
