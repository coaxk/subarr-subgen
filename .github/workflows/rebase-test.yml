# Weekly upstream-drift detector.
#
# Pulls latest McCloudS/subgen main, tries to apply our patches against it.
# Three outcomes:
#
#   1. Patches apply clean + validator passes
#      → upstream hasn't drifted in ways that affect us. Job succeeds quietly.
#      → If the upstream commit SHA is newer than our pinned SHA, opens a
#        low-priority "consider bumping" issue.
#
#   2. A patch fails to apply
#      → upstream restructured something we depend on. Opens (or updates) a
#        sticky issue titled "Upstream drift" with which patch(es) failed
#        and the conflicting hunks. We manually port.
#
#   3. Patches apply but validator fails
#      → patches landed but the structural contract broke. Probably an
#        upstream rename / function-signature change. Opens a drift issue.
#
#   4. stable-ts gone from main (no `stable_whisper` import + no `stable-ts`
#      requirement) → the drop-stable-ts refactor has MERGED. Opens a loud,
#      distinctly-labelled blocking issue — the subarr#171 trigger. This is
#      separate from routine drift (3): it means CUSTOM_REGROUP is dead on the
#      new base, not just that a patch needs re-porting.
#
# A second job (drop-stable-ts-preview) test-applies the stack against the
# UNMERGED refactor/drop-stable-ts branch every run and writes a migration-
# bill preview (how many patches break) to the run summary. Non-gating —
# early-warning only, so we watch the cost trend before the merge forces it.
#
# All issue reports are STICKY (scripts/sticky-issue.sh): each report path
# has a unique key label (upstream-bump / patch-drift / stable-ts-removal)
# and updates the one open issue in place rather than opening a duplicate
# every run. Close the issue once acted on; the next occurrence opens fresh.
#
# Runs Mondays 06:00 UTC. Also runnable manually.

name: rebase-test

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  rebase-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read # REQUIRED: without it the token can't check out this
      # private repo and `actions/checkout` dies with "repository not found"
      # (a permissions block is exhaustive — unlisted scopes are denied). This
      # is why the detector silently failed every run since inception.
      issues: write # open the drift / bump issue
    env:
      GH_TOKEN: ${{ github.token }} # gh CLI auth for the sticky-issue reporter
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: checkout (no submodules — we fetch upstream fresh)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: clone upstream main
        run: |
          rm -rf upstream/
          git clone --depth 1 https://github.com/McCloudS/subgen.git upstream
          cd upstream
          echo "UPSTREAM_HEAD=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "UPSTREAM_HEAD_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: read pinned SHA
        run: echo "PINNED_SHA=$(cat scripts/upstream.pin)" >> $GITHUB_ENV

      - name: check stable-ts still present on main (subarr#171 trigger)
        id: stablets
        run: |
          # The drop-stable-ts refactor removes BOTH the `stable_whisper`
          # import (code) and the `stable-ts` dependency (requirements). When
          # both are gone from main, the refactor has merged — the subarr#171
          # trigger has fired. Two-factor so a fluke in one file can't alarm.
          # This is the loud, unambiguous merge signal, separate from the
          # routine patch-drift report below.
          import_hits=$(grep -rl 'stable_whisper' upstream --include='*.py' 2> /dev/null | wc -l)
          req_hits=$(grep -rlE 'stable[-_]ts' upstream/requirements*.txt 2> /dev/null | wc -l)
          echo "stable_whisper import files: $import_hits | stable-ts requirement files: $req_hits"
          if [ "$import_hits" -eq 0 ] && [ "$req_hits" -eq 0 ]; then
            echo "stable-ts is GONE from upstream main — subarr#171 trigger fired"
            echo "STABLE_TS_PRESENT=no" >> $GITHUB_ENV
          else
            echo "STABLE_TS_PRESENT=yes" >> $GITHUB_ENV
          fi

      - name: try apply patches
        id: apply
        continue-on-error: true
        run: bash scripts/apply-patches.sh

      - name: try validator
        id: validate
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          python -m pip install --quiet  # nothing needed, just to set python up
          python scripts/validate-patched.py

      - name: report — clean drift (new upstream, patches still apply)
        if: steps.apply.outcome == 'success' && steps.validate.outcome == 'success' && env.UPSTREAM_HEAD != env.PINNED_SHA
        run: |
          bash scripts/sticky-issue.sh \
            "${{ github.repository }}" \
            upstream-bump \
            "Upstream bump available: ${UPSTREAM_HEAD_SHORT}" \
            .github/issue-templates/clean-bump.md \
            "upstream-bump,low-priority" \
            "Upstream still ahead of our pin as of $(date -u +%Y-%m-%dT%H:%MZ) — HEAD=${UPSTREAM_HEAD_SHORT}, patches still apply clean. ${RUN_URL}"

      - name: report — patches broke
        if: steps.apply.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          bash scripts/sticky-issue.sh \
            "${{ github.repository }}" \
            patch-drift \
            "Upstream drift broke patches (HEAD=${UPSTREAM_HEAD_SHORT})" \
            .github/issue-templates/drift-detected.md \
            "upstream-drift,blocking,patch-drift" \
            "Still drifting as of $(date -u +%Y-%m-%dT%H:%MZ) — upstream HEAD=${UPSTREAM_HEAD_SHORT}. ${RUN_URL}"

      - name: report — stable-ts REMOVED from main (subarr#171 trigger fired)
        if: env.STABLE_TS_PRESENT == 'no'
        run: |
          bash scripts/sticky-issue.sh \
            "${{ github.repository }}" \
            stable-ts-removal \
            "⚠️ subarr#171 TRIGGER: stable-ts removed from upstream main (HEAD=${UPSTREAM_HEAD_SHORT})" \
            .github/issue-templates/stable-ts-removed.md \
            "upstream-drift,blocking,stable-ts-removal" \
            "stable-ts STILL absent from upstream main as of $(date -u +%Y-%m-%dT%H:%MZ) — HEAD=${UPSTREAM_HEAD_SHORT}. Migration still pending. ${RUN_URL}"

      - name: report — no drift
        if: steps.apply.outcome == 'success' && steps.validate.outcome == 'success' && env.UPSTREAM_HEAD == env.PINNED_SHA
        run: echo "no drift — upstream HEAD == our pin."

  # Informational early-warning: test-apply the patch stack against the
  # UNMERGED refactor/drop-stable-ts branch to preview the migration bill
  # before it lands. Breaks here are EXPECTED (the branch rewrites the core
  # our patches hook into) so this job never gates — it always exits 0 and
  # writes the count + trend to the run summary. The loud merge alarm lives
  # in the rebase-test job above (stable-ts gone from main).
  drop-stable-ts-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout (no submodules — we fetch the branch fresh)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: clone upstream drop-stable-ts branch (if it still exists)
        id: clone
        continue-on-error: true
        run: |
          rm -rf upstream/
          if git clone --depth 1 -b refactor/drop-stable-ts \
               https://github.com/McCloudS/subgen.git upstream; then
            echo "branch_present=yes" >> $GITHUB_OUTPUT
            echo "BRANCH_HEAD_SHORT=$(git -C upstream rev-parse --short HEAD)" >> $GITHUB_ENV
          else
            echo "branch_present=no" >> $GITHUB_OUTPUT
          fi

      - name: branch gone — possible merge or delete
        if: steps.clone.outputs.branch_present == 'no'
        run: |
          {
            echo "## drop-stable-ts preview"
            echo
            echo "The \`refactor/drop-stable-ts\` branch could not be cloned."
            echo "It may have been **merged and deleted**, or renamed. Cross-"
            echo "check the rebase-test job's stable-ts-on-main alarm and subarr#171."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: preview migration bill (per-patch apply --check)
        if: steps.clone.outputs.branch_present == 'yes'
        run: |
          # Tally how many series patches still apply cleanly to the branch
          # tree. This is the live cost preview for the eventual #171 crossing.
          total=0; ok=0; broke=0; broke_list=""
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in \#*) continue ;; esac
            patch="$(echo "$line" | tr -d '[:space:]')"
            [ -z "$patch" ] && continue
            pf="$GITHUB_WORKSPACE/patches/$patch"
            [ -f "$pf" ] || continue
            total=$((total + 1))
            if git -C upstream apply --check "$pf" 2> /dev/null; then
              ok=$((ok + 1))
            else
              broke=$((broke + 1))
              broke_list="$broke_list\`$patch\` "
            fi
          done < patches/series
          {
            echo "## drop-stable-ts migration-bill preview"
            echo
            echo "Branch HEAD: \`${BRANCH_HEAD_SHORT}\`"
            echo
            echo "| patches | clean | break |"
            echo "| ------- | ----- | ----- |"
            echo "| $total | $ok | $broke |"
            echo
            if [ "$broke" -gt 0 ]; then
              echo "**Breaking patches:** $broke_list"
            else
              echo "All patches still apply — the branch has not yet diverged in ways that hit us."
            fi
            echo
            echo "_Breaks here are expected and non-blocking — this is the cost preview"
            echo "for the eventual subarr#171 migration, not a failure._"
          } >> "$GITHUB_STEP_SUMMARY"
